name: Pylint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint homeassistant bleak bleak-retry-connector
      - name: Run pylint
        run: |
          pylint --disable=R0903,R0902,R0912,R0913,R0917,R1702,R1705,C0103,W0223,W0613 \
                 --max-line-length=120 \
                 custom_components/sleepnumber_ble/
